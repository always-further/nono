name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  filter:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            src:
              - 'crates/**'
              - 'bindings/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'tests/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
              - '.github/scripts/**'
            docs:
              - 'docs/**'
              - '*.md'
              - '*.mdx'

  test:
    name: Test
    needs: filter
    if: ${{ needs.filter.outputs.src == 'true' && !startsWith(github.head_ref, 'dependabot/github_actions/') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo registry
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

  fmt:
    name: Rustfmt
    needs: filter
    if: ${{ needs.filter.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  ffi-header:
    name: Verify FFI Header
    needs: filter
    if: ${{ needs.filter.outputs.src == 'true' && !startsWith(github.head_ref, 'dependabot/github_actions/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Build nono-ffi (regenerates header)
        run: cargo build -p nono-ffi

      - name: Verify nono.h is up-to-date
        run: |
          if ! git diff --exit-code bindings/c/include/nono.h; then
            echo "ERROR: bindings/c/include/nono.h is out of date"
            echo "Run 'cargo build -p nono-ffi' and commit the updated header"
            exit 1
          fi

  clippy:
    name: Clippy
    needs: filter
    if: ${{ needs.filter.outputs.src == 'true' && !startsWith(github.head_ref, 'dependabot/github_actions/') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -D clippy::unwrap_used

  integration:
    name: Integration Tests
    needs: filter
    if: ${{ needs.filter.outputs.src == 'true' && !startsWith(github.head_ref, 'dependabot/github_actions/') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo registry
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Run integration tests
        run: |
          if [[ -f ./tests/run_integration_tests.sh ]]; then
            ./tests/run_integration_tests.sh
          else
            echo "No integration tests found, skipping"
          fi

  audit:
    name: Cargo Audit
    needs: filter
    if: ${{ needs.filter.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

  docs-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify docs routes are canonical
        run: |
          if rg -n -P 'href="/(?!cli/|assets/)|\]\(/(?!cli/|assets/)' docs/cli; then
            echo "Found non-canonical absolute docs links in docs/cli."
            exit 1
          fi

      - name: Verify docs nav pages exist
        run: |
          jq -r '.navigation.groups[].pages[]' docs/docs.json | while read -r page; do
            if [[ ! -f "docs/${page}.mdx" ]]; then
              echo "Missing page from docs.json navigation: docs/${page}.mdx"
              exit 1
            fi
          done

      - name: Verify CLI run flags are documented
        run: |
          chmod +x .github/scripts/check-cli-doc-flags.sh
          .github/scripts/check-cli-doc-flags.sh

  ci-pass:
    name: CI Pass
    needs: [filter, test, fmt, ffi-header, clippy, integration, audit, docs-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          echo '${{ toJSON(needs) }}' | jq -e '
            to_entries | map(
              .value.result == "success" or .value.result == "skipped"
            ) | all
          '
