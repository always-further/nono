speed: 50
delay: 0
pause: 0
clear: true

setup:
  - "rm -rf node_package"

steps:
  - text: |
      curl -fsS https://registry.npmjs.org/nono-eti-lifecycle-demo/latest | jq '{name, version, scripts, tarball: .dist.tarball}'
    wait_after: true
  - text: |
      curl -fsS https://registry.npmjs.org/nono-eti-lifecycle-demo/latest | jq '.scripts'
  - text: "curl -fsS https://registry.npmjs.org/nono-eti-lifecycle-demo/latest | jq -r '.dist.tarball'"
      hidden: true
      capture:
        name: tarball
        pattern: "(https://\\S+)"
      hidden: true
      capture:
        name: tarball
        pattern: "(https://\\S+)"

  - text: |
      tarball="$(curl -fsS https://registry.npmjs.org/nono-eti-lifecycle-demo/latest | jq -r '.dist.tarball')"
      curl -fsSL "$tarball" | tar -tzf -
    execute: false  # typed for show; actual execution below
    fake_output: |
      package/
      package/package.json
      package/postinstall.js
  - text: |
      curl -fsSL "{tarball}" \
      | tar -xOzf - package/package.json \
      | jq '{name, version, scripts}'

    - text: |
        curl -fsSL "{tarball}" \
        | tar -xOzf - package/postinstall.js
  - text: |
      mkdir node_package
      cd node_package
      printf '%s\n' '{"private":true,"dependencies":{"nono-eti-lifecycle-demo":"0.1.0"}}' > package.json
  - text: |
      nono run --profile demo-npm-supply-chain -- npm install --ignore-scripts
    wait_after: true
  - text: |
      nono run --profile demo-npm-supply-chain -- npm ls nono-eti-lifecycle-demo --depth=0
  - text: |
      rm -rf node_modules package-lock.json
      nono run --profile demo-npm-supply-chain -- npm install --foreground-scripts
    wait_after: true
